<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 项目讨论实时看板</title>
    <link rel="stylesheet" type="text/css" href="https://foxpixels.github.io/pixels/style.css">
    <style>
        body {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--main-font-color);
        }
        h1 {
            border-bottom: 1px solid #e1e4e8;
            padding-bottom: 10px;
        }
        #discussions {
            margin-top: 20px;
        }
        .discussion-item {
            background: var(--main-color);
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 3px var(--main-color);
            transition: box-shadow 0.2s;
        }
        .discussion-item:hover {
            box-shadow: 0 4px 12px var(--main-color);
        }
        .discussion-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }
        .discussion-title a {
            color: #0366d6;
            text-decoration: none;
        }
        .discussion-title a:hover {
            text-decoration: underline;
        }
        .discussion-meta {
            font-size: 12px;
            color: #586069;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .loading, .error {
            text-align: center;
            padding: 30px;
            font-size: 16px;
        }
        .error {
            color: #cb2431;
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #6a737d;
            text-align: center;
            border-top: 1px solid #e1e4e8;
            padding-top: 15px;
        }
        .refresh-btn {
            background: #2ea44f;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .refresh-btn:hover {
            background: #2c974b;
        }
    </style>
</head>
<body>
    <h1>GitHub 项目讨论实时看板</h1>
    <p>仓库：<strong id="repo-name">NekoPixels/I-like-cats</strong></p>
    <button class="refresh-btn" onclick="fetchDiscussions()">刷新讨论</button>
    <div id="discussions">
        <div class="loading">⏳ 正在加载讨论中...</div>
    </div>

    <script>
        // ===== 配置区域 =====
        const GITHUB_OWNER = 'NekoPixels';        // 仓库所有者
        const GITHUB_REPO = 'I-like-cats';         // 仓库名称
        const GITHUB_TOKEN = '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';  // 请替换为你的真实令牌（需 discussion 读取权限）

        // GraphQL 查询语句：获取最近 20 条讨论
        const GRAPHQL_QUERY = `
        {
          repository(owner: "${GITHUB_OWNER}", name: "${GITHUB_REPO}") {
            discussions(first: 20, orderBy: {field: CREATED_AT, direction: DESC}) {
              nodes {
                title
                url
                number
                createdAt
                author {
                  login
                  avatarUrl
                }
                comments {
                  totalCount
                }
                answer {
                  author {
                    login
                  }
                }
              }
            }
          }
        }`;

        // 获取讨论并渲染
        async function fetchDiscussions() {
            const container = document.getElementById('discussions');
            container.innerHTML = `<div class="loading">⏳ 正在加载讨论中...</div>`;

            // 检查令牌是否被替换
            if (GITHUB_TOKEN === 'YOUR_GITHUB_TOKEN') {
                container.innerHTML = `<div class="error">❌ 错误：请先在代码中设置你的 GitHub 令牌！</div>`;
                return;
            }

            try {
                const response = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: GRAPHQL_QUERY })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`API 请求失败 (${response.status}): ${errorData.message || '未知错误'}`);
                }

                const result = await response.json();

                // 处理 GraphQL 返回的错误
                if (result.errors) {
                    throw new Error(result.errors[0].message);
                }

                const discussions = result.data.repository.discussions.nodes;

                if (discussions.length === 0) {
                    container.innerHTML = `<div class="loading">📭 这个仓库还没有讨论。</div>`;
                    return;
                }

                // 构建讨论列表 HTML
                let html = '';
                discussions.forEach(disc => {
                    const authorLogin = disc.author ? disc.author.login : '未知用户';
                    const authorAvatar = disc.author ? disc.author.avatarUrl : '';
                    const commentCount = disc.comments.totalCount;
                    const answered = disc.answer ? '✅ 已回复' : '';

                    html += `
                        <div class="discussion-item">
                            <div class="discussion-title">
                                <a href="${disc.url}" target="_blank">${escapeHtml(disc.title)}</a>
                            </div>
                            <div class="discussion-meta">
                                <span class="meta-item">
                                    ${authorAvatar ? `<img src="${authorAvatar}" class="avatar" alt="">` : ''}
                                    ${escapeHtml(authorLogin)}
                                </span>
                                <span class="meta-item">📅 ${new Date(disc.createdAt).toLocaleString()}</span>
                                <span class="meta-item">💬 评论 ${commentCount}</span>
                                ${answered ? `<span class="meta-item">${answered}</span>` : ''}
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (error) {
                console.error('获取讨论失败:', error);
                container.innerHTML = `<div class="error">❌ 加载失败：${escapeHtml(error.message)}</div>`;
            }
        }

        // 简单的转义函数，防止 XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return unsafe;
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 页面加载后自动获取一次
        window.addEventListener('load', fetchDiscussions);
    </script>
</body>
</html>
